# GitHub Actions workflow for automatically labeling pull requests

name: Labeler
on: 
  pull_request_target:
    branches:
      - production
      - development

jobs:
  label:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v3  # Check out the repository
      - uses: actions/labeler@v4
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
